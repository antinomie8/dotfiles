footer = { fg = "#1f1f28", bg = "#dcd7ba" }
icon_info = { fg = "#6a9598" }
icon_warn = { fg = "#ff9e3b" }
icon_error = { fg = "#e82424" }

[filetype]
rules = [
	{ name = "*", is = "hidden", fg = "#54546d" },
	{ name = "*/", is = "hidden", fg = "#54546d" },
	{ name = "*", is = "block", fg = "#e6c384" },
	{ name = "*", is = "char", fg = "#e6c384" },
	{ name = "*", is = "exec", fg = "#ff5d62" },
	{ name = "*", is = "fifo", fg = "#c0a36e" },
	{ name = "*", is = "link", fg = "#6a9598" },
	{ name = "*/", is = "link", fg = "#6a9598" },
	{ name = "*", is = "orphan", fg = "#e82424" },
	{ name = "*/", is = "orphan", fg = "#e82424" },
	{ name = "*", is = "sock", fg = "#957fb8" },
	{ name = "*", is = "sticky", fg = "#7fb4ca" },
	{ name = "*/", is = "sticky", fg = "#7fb4ca" },
	{ name = "*/", fg = "#7e9cd8" },
	{ name = "*", fg = "#dcd7ba" },
]

[icon]
append_exts = [
	{ name = "asy", text = "󰒕", fg = "#ff0000" },
]
