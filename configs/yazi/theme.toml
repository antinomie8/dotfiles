prepend_conds = [
	# Special files
	{ if = "orphan", text = "", fg = "#b8b4d0" },
	{ if = "link", text = "", fg = "#b8b4d0" },
	{ if = "block", text = "" },
	{ if = "char", text = "" },
	{ if = "fifo", text = "" },
	{ if = "sock", text = "" },
	{ if = "sticky", text = "" },

	# fallback
	{ if = "dir",  text = "" },
	{ if = "exec", text = "", fg = "#4d5a5e" },
	{ if = "!dir", text = "" },
]
append_exts = [
	{ name = "asy", text = "󰒕", fg = "#ff0000" },
]
