[mgr]
ratio = [1,2,2]
sort_by = "natural"
sort_sensitive = false
sort_dir_first = true
sort_translit = true
show_hidden = true
show_symlink = true
scrollof = 200
title_format = "{cwd}"

[preview]
wrap = "no"
tab_size = 2
cache_dir = "/home/antoine/.cache/yazi"
image_filter = "nearest"
image_quality = 50

[opener]
edit = [
	{ run = '$EDITOR "$@"', block = true, desc = "Edit" },
]
open = [
	{ run = 'xdg-open "$@"', desc = "Open" },
]
zathura = [
	{ run = 'zathura "$@"', orphan = true, desc = "Open PDF" }
]

[open]
prepend_rules = [
	{ name = "*.pdf", use = "zathura" }
]

[plugin]
prepend_fetchers = [
	{ id = "git", name = "*", run = "git" },
	{ id = "git", name = "*/", run = "git" },
]
append_previewers = [
	{ url = "*", run = 'piper -- hexyl --border=none --terminal-width=$w "$1"' },
]

[input]
cursor_blink = false
shell_origin = "center"
shell_offset = [0, -2, 50, 3]
create_origin = "center"
create_offset = [0, -2, 50, 3]

[which]
sort = "desc"
sort_sensitive = false
sort_translit = true
