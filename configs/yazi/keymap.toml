[[mgr.prepend_keymap]]
on   = [ "g", "d" ]
run  = "cd ~/Téléchargements"
desc = "Cd to ~/Téléchargements"

[[mgr.prepend_keymap]]
on   = [ "d" ]
run  = "plugin remove"
desc = "Trash selected files"

[[mgr.prepend_keymap]]
on   = [ "D" ]
run  = "plugin remove -- --permanently"
desc = "Permanently delete selected files"

[[mgr.prepend_keymap]]
on   = "A"
run  = "create --dir"
desc = "Create a directory"

[[mgr.prepend_keymap]]
on   = "!"
run  = 'shell "$SHELL" --block'
desc = "Open shell here"

[[mgr.prepend_keymap]]
on   = [ "g", "r" ]
run  = 'shell -- ya emit cd "$(git rev-parse --show-toplevel)"'
desc = "cd back to the root of the git repository"

[[mgr.prepend_keymap]]
on   = "J"
run  = "arrow 5"

[[mgr.prepend_keymap]]
on   = "K"
run  = "arrow -5"

[[mgr.prepend_keymap]]
on   = [ "m", "t" ]
run  = "linemode mime"
desc = "Linemode: mime type"

[[mgr.prepend_keymap]]
on   = "<C-Enter>"
run = "shell %s --confirm"
desc = "Execute"

[[mgr.prepend_keymap]]
on   = "<C-y>"
run  = 'shell -- wl-copy < %s'
desc = "Copy to system clipboard"

[[mgr.prepend_keymap]]
on   = "<C-m>"
run  = 'shell --block -- neomutt -a "$@"'

[[mgr.prepend_keymap]]
on   = "f"
run  = "plugin jump-to-char -- --smartcase"
desc = "Jump to char"

[[mgr.prepend_keymap]]
on   = [ "c", "m" ]
run  = "plugin chmod"
desc = "Chmod on selected files"

[[mgr.prepend_keymap]]
on   = "M"
run  = "plugin mount"

[[mgr.prepend_keymap]]
on   = "l"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on   = "t"
run  = "plugin smart-tab"
desc = "Create a tab and enter the hovered directory"

[[mgr.prepend_keymap]]
on   = "2"
run  = "plugin smart-switch 1"
desc = "Switch or create tab 2"

[[mgr.prepend_keymap]]
on   = "F"
run  = "plugin smart-filter"
desc = "Smart filter"

[[mgr.prepend_keymap]]
on   = "<C-d>"
run  = "plugin diff"
desc = "Diff the selected with the hovered file"

[[mgr.prepend_keymap]]
on   = "u"
run  = "plugin restore"
desc = "Restore last deleted files/folders"

[[mgr.prepend_keymap]]
on   = "U"
run  = "plugin restore -- --interactive"
desc = "Restore deleted files/folders (Interactive)"

[[mgr.prepend_keymap]]
on   = [ "c", "a" ]
run  = "plugin compress -s"
desc = "Archive selected files"
