[[mgr.prepend_keymap]]
on   = "<C-o>"
run  = "back"
desc = "Go to previous directory"

[[mgr.prepend_keymap]]
on   = "<C-i>"
run  = "forward"
desc = "Go to next directory"

[[mgr.prepend_keymap]]
on   = [ "g", "d" ]
run  = "cd ~/Téléchargements"
desc = "Cd to ~/Téléchargements"

[[mgr.prepend_keymap]]
on   = [ "d" ]
run  = "plugin remove"
desc = "Trash selected files"

[[mgr.prepend_keymap]]
on   = [ "D" ]
run  = "plugin remove -- --permanently"
desc = "Permanently delete selected files"

[[mgr.prepend_keymap]]
on   = "A"
run  = "create --dir"
desc = "Create a directory"

[[mgr.prepend_keymap]]
on   = "!"
run  = 'shell "$SHELL" --block'
desc = "Open shell here"

[[mgr.prepend_keymap]]
on   = [ "g", "r" ]
run  = 'shell -- ya emit cd "$(git rev-parse --show-toplevel)"'
desc = "cd back to the root of the git repository"

[[mgr.prepend_keymap]]
on   = [ "m", "t" ]
run  = "linemode mime"
desc = "Linemode: mime type"

[[mgr.prepend_keymap]]
on   = "<C-Enter>"
run = "shell %s --confirm"
desc = "Execute"

[[mgr.prepend_keymap]]
on   = "<C-y>"
run  = 'shell -- wl-copy < %s'
desc = "Copy to system clipboard"

[[mgr.prepend_keymap]]
on   = "<C-m>"
run  = 'shell --block -- neomutt -a "$@"'

[[mgr.prepend_keymap]]
on   = "f"
run  = "plugin jump-to-char -- --smartcase"
desc = "Jump to char"

[[mgr.prepend_keymap]]
on   = [ "c", "m" ]
run  = "plugin chmod"
desc = "Chmod on selected files"

[[mgr.prepend_keymap]]
on   = "M"
run  = "plugin mount"

[[mgr.prepend_keymap]]
on   = "l"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on   = "t"
run  = "plugin smart-tab"
desc = "Create a tab and enter the hovered directory"

[[mgr.prepend_keymap]]
on   = "F"
run  = "plugin smart-filter"
desc = "Smart filter"

[[mgr.prepend_keymap]]
on   = "<C-S-d>"
run  = "plugin diff"
desc = "Diff the selected with the hovered file"

[[mgr.prepend_keymap]]
on   = "u"
run  = "plugin restore"
desc = "Restore last deleted files/folders"

[[mgr.prepend_keymap]]
on   = "U"
run  = "plugin restore -- --interactive"
desc = "Restore deleted files/folders (Interactive)"

[[mgr.prepend_keymap]]
on   = [ "c", "a" ]
run  = "plugin compress -s"
desc = "Archive selected files"

[[mgr.prepend_keymap]]
on = [ "1" ]
run = "plugin relative-motions 1"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "2" ]
run = "plugin relative-motions 2"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "3" ]
run = "plugin relative-motions 3"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "4" ]
run = "plugin relative-motions 4"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "5" ]
run = "plugin relative-motions 5"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "6" ]
run = "plugin relative-motions 6"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "7" ]
run = "plugin relative-motions 7"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "8" ]
run = "plugin relative-motions 8"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = [ "9" ]
run = "plugin relative-motions 9"
desc = "Move in relative steps"
