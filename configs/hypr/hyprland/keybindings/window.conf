# Focusing
bindm = Super, mouse:272, movewindow # Move
bindm = Super, mouse:274, movewindow # [hidden]
bindm = Super, mouse:273, resizewindow # Resize
#/# bind = Super, H/J/K/L,, # Focus in direction
bind = Super, H, movefocus, l # [hidden]
bind = Super, J, movefocus, d # [hidden]
bind = Super, K, movefocus, u # [hidden]
bind = Super, L, movefocus, r # [hidden]
#/# bind = Super, ←/↑/→/↓,, # Move in direction
bind = Super, Left,  movewindow, l # [hidden]
bind = Super, Down,  movewindow, d # [hidden]
bind = Super, Up,    movewindow, u # [hidden]
bind = Super, Right, movewindow, r # [hidden]
#/# bind = Super+Shift, ←/↑/→/↓,, # Resize in steps
bind = Super+Shift, Left,  resizeactive, -20 0  # [hidden]
bind = Super+Shift, Down,  resizeactive,  0  20 # [hidden]
bind = Super+Shift, Up,    resizeactive,  0 -20 # [hidden]
bind = Super+Shift, Right, resizeactive,  20 0  # [hidden]

# Window split ratio
#/# binde = Super, ;/:,, # Adjust split ratio
binde = Super, Semicolon, layoutmsg, splitratio -0.1 # [hidden]
binde = Super, Colon, layoutmsg, splitratio +0.1 # [hidden]
#/# bind = Super, !, layoutmsg, togglesplit # Toggle window split
bindd = Super, Exclam, Toggle window split, layoutmsg, togglesplit # [hidden]
# Positioning mode
bind = Super+Alt, Space, togglefloating, # Toggle floating/tiling
bind = Super, D, fullscreen, 1 # Maximize
bind = Super+Alt, F, fullscreen, 1 # Maximize
bind = Super, F, fullscreen, 0 # Fullscreen
bind = Super+Alt+Shift, F, fullscreenstate, 0 3 # Set app in fullscreen
bind = Super+Shift, F, global, quickshell:fullspaceToggle # Full space
bind = Super+Alt, P, pin # Pin
bind = Super, Q, killactive, # Close
bind = Super+Shift, Q, forcekillactive, # Kill

#/# bind = Super+Alt, Hash,, # Send to workspace # (1, 2, 3,...)
# We use raw keycodes because some keyboard layouts register number keys as different chars. The codes can be verified with `wev`
bind = Super+Alt, code:10, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 1 # [hidden]
bind = Super+Alt, code:11, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 2 # [hidden]
bind = Super+Alt, code:12, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 3 # [hidden]
bind = Super+Alt, code:13, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 4 # [hidden]
bind = Super+Alt, code:14, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 5 # [hidden]
bind = Super+Alt, code:15, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 6 # [hidden]
bind = Super+Alt, code:16, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 7 # [hidden]
bind = Super+Alt, code:17, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 8 # [hidden]
bind = Super+Alt, code:18, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 9 # [hidden]
bind = Super+Alt, code:19, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 10 # [hidden]
# keypad numbers
bind = Super+Alt, code:87, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 1  # [hidden]
bind = Super+Alt, code:88, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 2  # [hidden]
bind = Super+Alt, code:89, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 3  # [hidden]
bind = Super+Alt, code:83, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 4  # [hidden]
bind = Super+Alt, code:84, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 5  # [hidden]
bind = Super+Alt, code:85, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 6  # [hidden]
bind = Super+Alt, code:79, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 7  # [hidden]
bind = Super+Alt, code:80, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 8  # [hidden]
bind = Super+Alt, code:81, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 9  # [hidden]
bind = Super+Alt, code:90, exec, $scripts_dir/workspace_action.sh movetoworkspacesilent 10 # [hidden]
#/# bind = Super+Shift, Hash,, # Go to workspace with window # (1, 2, 3,...)
# We use raw keycodes because some keyboard layouts register number keys as different chars. The codes can be verified with `wev`
bind = Super+Shift, code:10, exec, $scripts_dir/workspace_action.sh movetoworkspace 1 # [hidden]
bind = Super+Shift, code:11, exec, $scripts_dir/workspace_action.sh movetoworkspace 2 # [hidden]
bind = Super+Shift, code:12, exec, $scripts_dir/workspace_action.sh movetoworkspace 3 # [hidden]
bind = Super+Shift, code:13, exec, $scripts_dir/workspace_action.sh movetoworkspace 4 # [hidden]
bind = Super+Shift, code:14, exec, $scripts_dir/workspace_action.sh movetoworkspace 5 # [hidden]
bind = Super+Shift, code:15, exec, $scripts_dir/workspace_action.sh movetoworkspace 6 # [hidden]
bind = Super+Shift, code:16, exec, $scripts_dir/workspace_action.sh movetoworkspace 7 # [hidden]
bind = Super+Shift, code:17, exec, $scripts_dir/workspace_action.sh movetoworkspace 8 # [hidden]
bind = Super+Shift, code:18, exec, $scripts_dir/workspace_action.sh movetoworkspace 9 # [hidden]
bind = Super+Shift, code:19, exec, $scripts_dir/workspace_action.sh movetoworkspace 10 # [hidden]
# keypad numbers
bind = Super+Shift, code:87, exec, $scripts_dir/workspace_action.sh movetoworkspace 1  # [hidden]
bind = Super+Shift, code:88, exec, $scripts_dir/workspace_action.sh movetoworkspace 2  # [hidden]
bind = Super+Shift, code:89, exec, $scripts_dir/workspace_action.sh movetoworkspace 3  # [hidden]
bind = Super+Shift, code:83, exec, $scripts_dir/workspace_action.sh movetoworkspace 4  # [hidden]
bind = Super+Shift, code:84, exec, $scripts_dir/workspace_action.sh movetoworkspace 5  # [hidden]
bind = Super+Shift, code:85, exec, $scripts_dir/workspace_action.sh movetoworkspace 6  # [hidden]
bind = Super+Shift, code:79, exec, $scripts_dir/workspace_action.sh movetoworkspace 7  # [hidden]
bind = Super+Shift, code:80, exec, $scripts_dir/workspace_action.sh movetoworkspace 8  # [hidden]
bind = Super+Shift, code:81, exec, $scripts_dir/workspace_action.sh movetoworkspace 9  # [hidden]
bind = Super+Shift, code:90, exec, $scripts_dir/workspace_action.sh movetoworkspace 10 # [hidden]

#/# bind = Super+Shift, Scroll ↑/↓,, # Send to workspace left/right
bind = Super+Shift, mouse_down, movetoworkspace, r-1 # [hidden]
bind = Super+Shift, mouse_up, movetoworkspace, r+1 # [hidden]
bind = Super+Alt, mouse_down, movetoworkspace, -1 # [hidden]
bind = Super+Alt, mouse_up, movetoworkspace, +1 # [hidden]

#/# bind = Super+Alt, ←/→,, # Send to workspace left/right
bind = Super+Alt, Left, movetoworkspace, r-1 # [hidden]
bind = Super+Alt, Right, movetoworkspace, r+1 # [hidden]

bind = Super+Alt, S, movetoworkspacesilent, special # Send to scratchpad

bind = Super+Alt, code:91, exec, $scripts_dir/window_bundle.sh movetoworkspace +10 # Next window bundle
bind = Super+Shift+Alt, code:91, exec, $scripts_dir/window_bundle.sh movetoworkspace -10 # Previous window bundle
bind = Super+Alt+Ctrl, code:91, exec, $scripts_dir/window_bundle.sh movetoworkspacesilent +10 # [hidden]
bind = Super+Shift+Alt+Ctrl, code:91, exec, $scripts_dir/window_bundle.sh movetoworkspacesilent -10 # [hidden]
