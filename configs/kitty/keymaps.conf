kitty_mod               ctrl+shift

# tabs
map alt+&               goto_tab 1
map alt+é               goto_tab 2
map alt+"               goto_tab 3
map alt+'               goto_tab 4
map alt+(               goto_tab 5
map alt+-               goto_tab 6
map alt+è               goto_tab 7
map alt+_               goto_tab 8
map alt+ç               goto_tab 9
map alt+à               goto_tab 10
map alt+kp_1            goto_tab 1
map alt+kp_2            goto_tab 2
map alt+kp_3            goto_tab 3
map alt+kp_4            goto_tab 4
map alt+kp_5            goto_tab 5
map alt+kp_6            goto_tab 6
map alt+kp_7            goto_tab 7
map alt+kp_8            goto_tab 8
map alt+kp_9            goto_tab 9

# scrolling
map kitty_mod+k         scroll_line_up
map kitty_mod+j         scroll_line_down
map kitty_mod+u         scroll_page_up
map kitty_mod+d         scroll_page_down
map page_up             scroll_page_up
map page_down           scroll_page_down

# windows
map kitty_mod+space     toggle_layout stack
map kitty_mod+enter     new_window
map kitty_mod+q         close_window
map kitty_mod+w         quit
map kitty_mod+;         detach_window ask
map kitty_mod+]         next_window
map kitty_mod+[         previous_window
map kitty_mod+f         move_window_forward
map kitty_mod+b         move_window_backward
map kitty_mod+s         focus_visible_window

# window layout
map kitty_mod+r>t       goto_layout tall
map kitty_mod+r>f       goto_layout fat
map kitty_mod+r>s       goto_layout stack

# font size
map kitty_mod+equal     increase_font_size
map kitty_mod+minus     decrease_font_size
map kitty_mod+backspace restore_font_size
map ctrl+plus           change_font_size all +0.5
map ctrl+equal          change_font_size all +0.5
map ctrl+kp_add         change_font_size all +0.5
map ctrl+minus          change_font_size all -0.5
map ctrl+underscore     change_font_size all -0.5
map ctrl+kp_subtract    change_font_size all -0.5
map ctrl+0              change_font_size all 0
map ctrl+kp_0           change_font_size all 0

# misc
map kitty_mod+\         toggle_fullscreen
map kitty_mod+u         input_unicode_character
map kitty_mod+e>c       edit_config_file
map f1                  show_kitty_env_vars

# Copy and paste
map ctrl+c              copy_and_clear_or_interrupt
map ctrl+v              paste_from_clipboard

# Plugins
map kitty_mod+f         launch --location=hsplit --allow-remote-control kitty +kitten kitty_search/search.py @active-kitty-window-id
map Alt+Insert          kitten kitty_grab/grab.py



# Author: anongecko

# Essential Keybindings Cheat Sheet
# kitty_mod = ctrl+shift
# map cmd+t new_tab                                           # `cmd+t` to create a new tab
# map ctrl+shift+q close_tab                                 # `ctrl+shift+q` to close the current tab
# map cmd+right next_tab                                   # `cmd+right` to go to the next tab
# map cmd+left previous_tab                                  # `cmd+left` to go to the previous tab
# map cmd+enter new_window                                   # `cmd+enter` to create a new window
# map cmd+w close_window                                      # `cmd+w` to close the current window
# map ctrl+shift+] next_window                             # `ctrl+shift+]` to go to the next window
# map ctrl+shift+[ previous_window                           # `ctrl+shift+[` to go to the previous window
# map ctrl+shift+home scroll_home                           # `ctrl+shift+home` to scroll to the top
# map ctrl+shift+end scroll_end                             # `ctrl+shift+end` to scroll to the bottom
# map cmd+up scroll_line_up                                 # `cmd+up` to scroll up
# map cmd+down scroll_line_down                               # `cmd+down` to scroll down
# map ctrl+shift+page_up scroll_page_up                     # `ctrl+shift+page_up` to scroll up one page
# map ctrl+shift+page_down scroll_page_down                   # `ctrl+shift+page_down` to scroll down one page
# map ctrl+shift+z scroll_to_prompt -1                      # `ctrl+shift+z` to scroll to the previous prompt
# map ctrl+shift+x scroll_to_prompt 1                       # `ctrl+shift+x` to scroll to the next prompt
# map cmd+c copy_to_clipboard                               # `cmd+c` to copy
# map cmd+v paste_from_clipboard                             # `cmd+v` to paste
# map cmd+\ clear_selection                                  # `cmd+\` to clear the selection
# map ctrl+shift+f5 load_config_file                        # `ctrl+shift+f5` to reload the config

