kitty_mod ctrl+shift

# tabs
map alt+&                 goto_tab 1
map alt+é                 goto_tab 2
map alt+"                 goto_tab 3
map alt+'                 goto_tab 4
map alt+(                 goto_tab 5
map alt+-                 goto_tab 6
map alt+è                 goto_tab 7
map alt+_                 goto_tab 8
map alt+ç                 goto_tab 9
map alt+à                 goto_tab 10
map alt+kp_1              goto_tab 1
map alt+kp_2              goto_tab 2
map alt+kp_3              goto_tab 3
map alt+kp_4              goto_tab 4
map alt+kp_5              goto_tab 5
map alt+kp_6              goto_tab 6
map alt+kp_7              goto_tab 7
map alt+kp_8              goto_tab 8
map alt+kp_9              goto_tab 9

# scrolling
map kitty_mod+k           scroll_line_up
map kitty_mod+j           scroll_line_down
map kitty_mod+u           scroll_page_up
map kitty_mod+d           scroll_page_down
map page_up               scroll_page_up
map page_down             scroll_page_down

# windows
map kitty_mod+enter       launch --cwd current
map alt+t                 launch --type tab --cwd current
map f5                    launch --location=hsplit
map f6                    launch --location=vsplit
map f4                    launch --location=split
map f7                    layout_action rotate
map kitty_mod+q           close_tab
map kitty_mod+$           detach_window ask
map kitty_mod+]           next_window
map kitty_mod+[           previous_window
map kitty_mod+f           move_window_forward
map kitty_mod+b           move_window_backward
map kitty_mod+s           focus_visible_window
# Move the active window in the indicated direction
map kitty_mod+up          move_window up
map kitty_mod+left        move_window left
map kitty_mod+right       move_window right
map kitty_mod+down        move_window down

# window layout
map kitty_mod+l>t         goto_layout tall
map kitty_mod+l>f         goto_layout fat
map kitty_mod+l>s         goto_layout stack
# Move the active window to the indicated screen edge
map ctrl+shift+alt+up     layout_action move_to_screen_edge top
map ctrl+shift+alt+left   layout_action move_to_screen_edge left
map ctrl+shift+alt+right  layout_action move_to_screen_edge right
map ctrl+shift+alt+down   layout_action move_to_screen_edge bottom
# make focused window take this much of its parent window's size
map ctrl+.                layout_action bias 80

# font size
map kitty_mod+plus        change_font_size all +0.5
map kitty_mod+equal       change_font_size all +0.5
map kitty_mod+kp_add      change_font_size all +0.5
map kitty_mod+minus       change_font_size all -0.5
map kitty_mod+kp_subtract change_font_size all -0.5
map kitty_mod+backspace   restore_font_size

# misc
map kitty_mod+u           input_unicode_character
map kitty_mod+f1          show_kitty_env_vars

# Copy and paste
map ctrl+c                copy_and_clear_or_interrupt
map ctrl+Insert           paste_from_clipboard

# Plugins
map kitty_mod+f           launch --location=hsplit --allow-remote-control kitty +kitten kitty_search/search.py @active-kitty-window-id
map Alt+Insert            kitten kitty_grab/grab.py

# https://github.com/mrjones2014/smart-splits.nvim
map ctrl+j                neighboring_window down
map ctrl+k                neighboring_window up
map ctrl+h                neighboring_window left
map ctrl+l                neighboring_window right
# Unset the mappings to pass the keys to neovim
map --when-focus-on       var:IS_NVIM ctrl+j
map --when-focus-on       var:IS_NVIM ctrl+k
map --when-focus-on       var:IS_NVIM ctrl+h
map --when-focus-on       var:IS_NVIM ctrl+l
# the number here is the resize amount
map alt+j                 kitten smart_splits/relative_resize.py down  3
map alt+k                 kitten smart_splits/relative_resize.py up    3
map alt+h                 kitten smart_splits/relative_resize.py left  3
map alt+l                 kitten smart_splits/relative_resize.py right 3
# Unset the mappings to pass the keys to neovim
map --when-focus-on       var:IS_NVIM alt+h
map --when-focus-on       var:IS_NVIM alt+j
map --when-focus-on       var:IS_NVIM alt+k
map --when-focus-on       var:IS_NVIM alt+l
